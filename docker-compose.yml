services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: founderbox
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/founderbox
      SESSION_SECRET: change-me
      API_KEY_HASH_SECRET: change-me
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-FounderBox <login@example.com>}
      FOUNDERBOX_WEB_URL: http://localhost:3000
      FOUNDERBOX_MCP_URL: http://localhost:8787/mcp
      FOUNDERBOX_ALLOWED_ORIGINS: http://localhost:3000
      FOUNDERBOX_ALLOWED_HOSTS: localhost,127.0.0.1
      FOUNDERBOX_TEXT_CALLS_PER_DAY: ${FOUNDERBOX_TEXT_CALLS_PER_DAY:-500}
      FOUNDERBOX_PDF_CALLS_PER_DAY: ${FOUNDERBOX_PDF_CALLS_PER_DAY:-20}
      FOUNDERBOX_FREE_ACCOUNTABILITY_CALLS_PER_DAY: ${FOUNDERBOX_FREE_ACCOUNTABILITY_CALLS_PER_DAY:-50}
      FOUNDERBOX_PRO_ACCOUNTABILITY_CALLS_PER_DAY: ${FOUNDERBOX_PRO_ACCOUNTABILITY_CALLS_PER_DAY:-1000}
      FOUNDERBOX_ARTIFACT_TTL_DAYS: ${FOUNDERBOX_ARTIFACT_TTL_DAYS:-7}
      FOUNDERBOX_ARTIFACT_DIR: /data/artifacts
      FOUNDERBOX_DEFAULT_FLOW_TEMPLATE: ${FOUNDERBOX_DEFAULT_FLOW_TEMPLATE:-solo-dev}
      FOUNDERBOX_PRO_PRICE_USD: ${FOUNDERBOX_PRO_PRICE_USD:-8}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      LEMONSQUEEZY_API_KEY: ${LEMONSQUEEZY_API_KEY:-}
      LEMONSQUEEZY_STORE_ID: ${LEMONSQUEEZY_STORE_ID:-}
      LEMONSQUEEZY_WEBHOOK_SECRET: ${LEMONSQUEEZY_WEBHOOK_SECRET:-}
      LEMONSQUEEZY_PRO_MONTHLY_VARIANT_ID: ${LEMONSQUEEZY_PRO_MONTHLY_VARIANT_ID:-}
      LEMONSQUEEZY_FOUNDING_PRO_VARIANT_ID: ${LEMONSQUEEZY_FOUNDING_PRO_VARIANT_ID:-}
      LEMONSQUEEZY_STORE_BILLING_URL: ${LEMONSQUEEZY_STORE_BILLING_URL:-}
    ports:
      - "3000:3000"
    volumes:
      - artifact_data:/data/artifacts
    depends_on:
      - postgres

  mcp:
    build:
      context: .
      dockerfile: apps/mcp/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/founderbox
      SESSION_SECRET: change-me
      API_KEY_HASH_SECRET: change-me
      FOUNDERBOX_WEB_URL: http://localhost:3000
      FOUNDERBOX_MCP_URL: http://localhost:8787/mcp
      FOUNDERBOX_ALLOWED_ORIGINS: http://localhost:3000
      FOUNDERBOX_ALLOWED_HOSTS: localhost,127.0.0.1
      FOUNDERBOX_DISABLE_LIMITS: "true"
      FOUNDERBOX_TEXT_CALLS_PER_DAY: ${FOUNDERBOX_TEXT_CALLS_PER_DAY:-500}
      FOUNDERBOX_PDF_CALLS_PER_DAY: ${FOUNDERBOX_PDF_CALLS_PER_DAY:-20}
      FOUNDERBOX_FREE_ACCOUNTABILITY_CALLS_PER_DAY: ${FOUNDERBOX_FREE_ACCOUNTABILITY_CALLS_PER_DAY:-50}
      FOUNDERBOX_PRO_ACCOUNTABILITY_CALLS_PER_DAY: ${FOUNDERBOX_PRO_ACCOUNTABILITY_CALLS_PER_DAY:-1000}
      FOUNDERBOX_ARTIFACT_TTL_DAYS: ${FOUNDERBOX_ARTIFACT_TTL_DAYS:-7}
      FOUNDERBOX_ARTIFACT_DIR: /data/artifacts
      FOUNDERBOX_DEV_API_KEY: fb_live_dev
    ports:
      - "8787:8787"
    volumes:
      - artifact_data:/data/artifacts
    depends_on:
      - postgres

volumes:
  postgres_data:
  artifact_data:
